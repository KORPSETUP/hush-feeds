name: Hush pin drip (daily, gated)

# Hush parity of korp-blog's daily release job. Runs once a day, GATED: it only
# releases pins for batches Brandon has STARTED (Quarry's start_campaign("hush")
# assigns release_dates at the chosen rate). Un-started pins have no
# release_date, so when nothing is started this releases nothing — every day,
# forever. Once a batch is started, this drips it at its rate until exhausted.
# Feeds publish via GitHub Pages (docs/feeds/). Zero secrets (GITHUB_TOKEN).

on:
  schedule:
    - cron: "0 13 * * *"     # 13:00 UTC daily (~9am US Eastern)
  workflow_dispatch: {}        # optional manual "Run workflow" (same gated logic)

permissions:
  contents: write

concurrency:
  group: hush-pin-drip
  cancel-in-progress: false

jobs:
  drip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Release today's due Hush pins (started batches only)
        run: python scripts/build_pin_feeds.py

      - name: Commit + push if any feed changed
        run: |
          if [ -n "$(git status --porcelain docs/feeds)" ]; then
            git config user.name "hush-pin-drip[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/feeds
            git commit -m "chore(pins): daily Hush drip $(date -u +%Y-%m-%d)"
            git push
            echo "Released today's due Hush pins."
          else
            echo "Nothing due today (no started batch, or batch complete)."
          fi
